apiVersion: apps/v1
kind: Deployment
metadata:
  name: materia-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: materia-service
  template:
    metadata:
      labels:
        app: materia-service
    spec:
      containers:
        - name: materia-service
          image: emherrerat/materia-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-service:5432/materia_db"
            - name: DB_USERNAME
              value: "admin"
            - name: DB_PASSWORD
              value: "admin123"
---
apiVersion: v1
kind: Service
metadata:
  name: materia-service
spec:
  type: LoadBalancer
  selector:
    app: materia-service
  ports:
    - port: 8082
      targetPort: 8082