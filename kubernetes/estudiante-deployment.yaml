apiVersion: apps/v1
kind: Deployment
metadata:
  name: estudiante-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: estudiante-service
  template:
    metadata:
      labels:
        app: estudiante-service
    spec:
      containers:
        - name: estudiante-service
          image: TU_USUARIO/estudiante-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-service:5432/estudiante_db"
            - name: DB_USERNAME
              value: "admin"
            - name: DB_PASSWORD
              value: "admin123"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: estudiante-service
spec:
  type: LoadBalancer
  selector:
    app: estudiante-service
  ports:
    - port: 8081
      targetPort: 8081